apiVersion: v1
kind: ConfigMap
metadata:
  name: trm-dataset-build-script
  namespace: trm
data:
  run.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    echo "[dataset] starting builder"
    apt-get update -y >/dev/null && apt-get install -y --no-install-recommends git ca-certificates >/dev/null && rm -rf /var/lib/apt/lists/*
    python3 -V
    python3 -m pip install --upgrade pip wheel setuptools >/dev/null
    python3 -m pip install numpy pydantic argdantic >/dev/null
    cd /workspace
    mkdir -p TinyRecursiveModels
    if [ ! -d TinyRecursiveModels/.git ]; then
      git clone --depth=1 https://github.com/SamsungSAILMontreal/TinyRecursiveModels.git TinyRecursiveModels
    fi
    cd TinyRecursiveModels
    mkdir -p kaggle/combined/arc-agi/{training2,evaluation2,concept}
    echo "[dataset] cloning ARC-AGI-2 & ConceptARC"
    tmp_arc2=$(mktemp -d); git clone --depth=1 https://github.com/arcprize/ARC-AGI-2.git "$tmp_arc2"
    cp -v "$tmp_arc2/data/training"/*.json kaggle/combined/arc-agi/training2/ || true
    cp -v "$tmp_arc2/data/evaluation"/*.json kaggle/combined/arc-agi/evaluation2/ || true
    rm -rf "$tmp_arc2"
    tmp_concept=$(mktemp -d); git clone --depth=1 https://github.com/victorvikram/ConceptARC.git "$tmp_concept"
    find "$tmp_concept/corpus" -type f -name '*.json' -print0 | xargs -0 -I{} cp -v {} kaggle/combined/arc-agi/concept/ || true
    rm -rf "$tmp_concept"
    echo "[dataset] aggregating JSONs"
    python3 - <<'PY'
import json
from pathlib import Path
root = Path('kaggle/combined/arc-agi')
def aggregate(sub):
    out = {}
    for p in (root/sub).rglob('*.json'):
        out[p.stem] = json.loads(p.read_text())
    print(sub, '->', len(out), 'puzzles')
    return out
for subset in ['training2','evaluation2','concept']:
    data = aggregate(Path(subset))
    (Path('kaggle/combined')/f'arc-agi_{subset}_challenges.json').write_text(json.dumps(data))
PY
    echo "[dataset] building TRM dataset"
    python3 -m dataset.build_arc_dataset \
      --input-file-prefix kaggle/combined/arc-agi \
      --output-dir data/arc2concept-aug-1000 \
      --subsets training2 evaluation2 concept \
      --test-set-name evaluation2
    echo "[dataset] fingerprint"
    python3 - <<'PY'
from pathlib import Path
import json, hashlib
base=Path('data/arc2concept-aug-1000')
counts={}
for split in ['train','test']:
    p=base/split/'puzzles.json'
    if p.exists():
        data=p.read_bytes()
        counts[split]=len(json.loads(data))
        (base/f'{split}.sha256').write_text(hashlib.sha256(data).hexdigest())
print(json.dumps({'counts':counts},indent=2))
PY
    echo "[dataset] done"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: trm-dataset-build-rwx
  namespace: trm
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: builder
          image: python:3.10-slim
          command: ["bash","/script/run.sh"]
          volumeMounts:
            - name: ws
              mountPath: /workspace
            - name: script
              mountPath: /script
      volumes:
        - name: ws
          persistentVolumeClaim:
            claimName: trm-workspace-rwx
        - name: script
          configMap:
            name: trm-dataset-build-script
            defaultMode: 0755

