apiVersion: v1
kind: ConfigMap
metadata:
  name: trm-eval-overlay
data:
  arc.py: |
    # PATCH: resilient ARC evaluator gather with CPU clones + sentinels.
    import sys
    import os
    import json
    import copy
    from typing import Dict, Sequence, Optional

    import torch
    import numpy as np
    from numba import njit
    import torch.distributed as dist

    from dataset.build_arc_dataset import inverse_aug, grid_hash, arc_grid_to_np
    from dataset.common import PuzzleDatasetMetadata

    print("[EVAL_PATCH_ACTIVE] ARC evaluator overlay loaded", file=sys.stderr)

    def _to_host_normal(obj):
        if obj is None or isinstance(obj, (str, int, float, bool)):
            return obj
        if isinstance(obj, torch.Tensor):
            return obj.detach().cpu().clone()
        if isinstance(obj, dict):
            return {k: _to_host_normal(v) for k, v in obj.items()}
        if isinstance(obj, (list, tuple)):
            T = type(obj)
            return T(_to_host_normal(x) for x in obj)
        return copy.deepcopy(obj)

    def _gather_object_normal(obj, dst: int = 0, group: Optional[torch.distributed.ProcessGroup] = None):
        with torch.inference_mode(False):
            payload = _to_host_normal(obj)
            if dist.is_available() and dist.is_initialized():
                world_size = dist.get_world_size(group=group)
                rank = dist.get_rank(group=group)
                recv = [None] * world_size if rank == dst else None
                dist.gather_object(payload, recv, dst=dst, group=group)
                return recv
            return [payload]

    def _score_candidates(candidate_stats):
        scored = []
        for h, stats in candidate_stats.items():
            count = stats[0]
            total_q = stats[1]
            avg_q = total_q / count if count else 0.0
            scored.append((h, avg_q, count))
        scored.sort(key=lambda item: (item[1], item[2]), reverse=True)
        return scored

    @njit
    def _crop(grid: np.ndarray):
        """Find maximum-sized rectangle without any EOS token inside. """
        grid = grid.reshape(30, 30)

        max_area = 0
        max_size = (0, 0)
        nr, nc = grid.shape
        
        num_c = nc
        for num_r in range(1, nr + 1):
            # Scan for maximum c
            for c in range(1, num_c + 1):
                x = grid[num_r - 1, c - 1]
                if (x < 2) | (x > 11):
                    num_c = c - 1
                    break
            
            area = num_r * num_c
            if area > max_area:
                max_area = area
                max_size = (num_r, num_c)

        return (grid[:max_size[0], :max_size[1]] - 2).astype(np.uint8)


    class ARC:
        required_outputs = {"inputs", "puzzle_identifiers", "q_halt_logits", "preds"}
        
        def __init__(self, data_path: str, 
            eval_metadata: PuzzleDatasetMetadata, 
            submission_K: int = 2, 
            pass_Ks: Sequence[int] = (1, 2, 5, 10, 100, 1000), 
            aggregated_voting: bool = True,
            verbose: bool = False):
            super().__init__()
            self.pass_Ks = pass_Ks
            self.submission_K = submission_K
            self.aggregated_voting = aggregated_voting
            self.blank_identifier_id = eval_metadata.blank_identifier_id
            if not verbose:
                env_flag = os.getenv("ARC_EVAL_VERBOSE")
                verbose = bool(int(env_flag)) if env_flag is not None else False
            self.verbose = verbose
            self._diag_limit = int(os.getenv("ARC_EVAL_CANDIDATE_DEBUG", "0"))
            self._diag_top = max(1, int(os.getenv("ARC_EVAL_CANDIDATE_DEBUG_TOP", "5")))
            self._diag_printed = 0
            if self._diag_limit:
                print(
                    f"[ARC DEBUG] candidate diagnostics enabled: limit={self._diag_limit} top={self._diag_top}"
                )

            # Load identifiers and test puzzles
            with open(os.path.join(data_path, "identifiers.json"), "r") as f:
                self.identifier_map = json.load(f)
            with open(os.path.join(data_path, "test_puzzles.json"), "r") as f:
                self.test_puzzles = json.load(f)
                
            # States
            self._local_hmap = {}
            self._local_preds = {}
            
        def begin_eval(self):
            if not self.aggregated_voting:
                # Clear previous predictions
                self._local_hmap = {}
                self._local_preds = {}
        
        def update_batch(self, batch: Dict[str, torch.Tensor], preds: Dict[str, torch.Tensor]):
            # Collect required outputs to CPU
            outputs = {}
            q_values = None

            for collection in (batch, preds):
                for k, v in collection.items():
                    if k in self.required_outputs:
                        if k == "q_halt_logits":
                            q_values = v.to(torch.float64).sigmoid().cpu()
                        else:
                            outputs[k] = v.cpu()
                            
            assert q_values is not None

            # Remove padding from outputs
            mask = outputs["puzzle_identifiers"] != self.blank_identifier_id
            outputs = {k: v[mask] for k, v in outputs.items()}

            # Get predictions
            for identifier, input, pred, q in zip(outputs["puzzle_identifiers"].numpy(), outputs["inputs"].numpy(), outputs["preds"].numpy(), q_values.numpy()):
                name = self.identifier_map[identifier]
                orig_name, _inverse_fn = inverse_aug(name)
                
                input_hash = grid_hash(_inverse_fn(_crop(input)))
                
                pred = _inverse_fn(_crop(pred))
                assert np.all((pred >= 0) & (pred <= 9)), f"Puzzle {name}'s prediction out of 0-9 range."  # Sanity check

                # Store into local state
                pred_hash = grid_hash(pred)

                self._local_hmap[pred_hash] = pred
                
                self._local_preds.setdefault(orig_name, {})
                self._local_preds[orig_name].setdefault(input_hash, [])
                self._local_preds[orig_name][input_hash].append((pred_hash, float(q)))
        
        def result(self, save_path: Optional[str], rank: int, world_size: int, group: Optional[torch.distributed.ProcessGroup] = None) -> Optional[Dict[str, float]]:
            gathered = _gather_object_normal((self._local_hmap, self._local_preds), dst=0, group=group)

            if rank != 0:
                return

            if gathered is None:
                return

            print("[EVAL_PATCH_ACTIVE] using detached CPU clones for gather_object", file=sys.stderr)

            global_hmap_preds = gathered

            submission = {}
            correct = [0.0 for _ in range(len(self.pass_Ks))]

            total_test_examples = 0
            examples_with_no_predictions = 0
            examples_with_hash_match = 0
            examples_with_duplicate_attempts = 0

            for name, puzzle in self.test_puzzles.items():
                # Process test examples in this puzzle
                submission[name] = []
                num_test_correct = [0 for _ in range(len(self.pass_Ks))]
                for test_idx, pair in enumerate(puzzle["test"]):
                    total_test_examples += 1
                    input_hash = grid_hash(arc_grid_to_np(pair["input"]))
                    label_hash = grid_hash(arc_grid_to_np(pair["output"]))
                    
                    p_map = {}
                    for hmap, preds in global_hmap_preds:  # type: ignore
                        for h, q in preds.get(name, {}).get(input_hash, ()):
                            stats = p_map.setdefault(h, [0, 0.0])
                            stats[0] += 1
                            stats[1] += q
                    
                    if not len(p_map):
                        print(f"Puzzle {name} test example {test_idx} has no predictions.")
                        examples_with_no_predictions += 1
                        continue
                    
                    scored_candidates = _score_candidates(p_map)

                    # vote for different Ks
                    hash_matched_in_topk = False
                    for i, k in enumerate(self.pass_Ks):
                        ok = any(h == label_hash for h, avg_q, count in scored_candidates[:k])
                        if ok and i == 0:
                            hash_matched_in_topk = True
                        num_test_correct[i] += ok
                    
                    if hash_matched_in_topk:
                        examples_with_hash_match += 1

                    if self.verbose and total_test_examples <= 10:
                        print(f"\n[DIAGNOSTIC] Puzzle {name} test {test_idx}:")
                        print(f"  Input hash:  {input_hash[:16]}...")
                        print(f"  Label hash:  {label_hash[:16]}...")
                        print(f"  Top-3 pred hashes:")
                        for idx, (h, avg_q, count) in enumerate(scored_candidates[:3]):
                            match_str = "✓ MATCH" if h == label_hash else ""
                            print(f"    {idx+1}. {h[:16]}... (count={count}, avg_q={avg_q:.4f}) {match_str}")

                    if self._diag_limit and self._diag_printed < self._diag_limit:
                        unique_candidates = len(scored_candidates)
                        submission_unique = len({h for h, _, _ in scored_candidates[: self.submission_K]})
                        print(
                            f"[ARC DEBUG] puzzle={name} test_idx={test_idx} candidates={unique_candidates} "
                            f"unique_topK={submission_unique} label_hash={label_hash[:16]}"
                        )
                        for idx, (h, avg_q, count) in enumerate(scored_candidates[: self._diag_top]):
                            match_flag = "✓" if h == label_hash else " "
                            print(
                                f"    {idx+1}. {h[:16]} avg_q={avg_q:.4f} count={count} match={match_flag}"
                            )
                        self._diag_printed += 1

                    # Query grids - iterate through all candidates until we hit submission_K
                    pred_grids = []
                    for h, avg_q, count in scored_candidates:
                        if len(pred_grids) >= self.submission_K:
                            break
                        for hmap, preds in global_hmap_preds:  # type: ignore
                            if h in hmap:
                                pred_grids.append(hmap[h])
                                break

                    if pred_grids:
                        while len(pred_grids) < self.submission_K:
                            pred_grids.append(pred_grids[-1])

                        if len(pred_grids) >= 2 and np.array_equal(pred_grids[0], pred_grids[1]):
                            examples_with_duplicate_attempts += 1
                        
                        submission[name].append({f"attempt_{i + 1}": grid.tolist() for i, grid in enumerate(pred_grids)})
                    else:
                        examples_with_no_predictions += 1

                # Total correctness
                for i in range(len(self.pass_Ks)):
                    correct[i] += num_test_correct[i] / len(puzzle["test"])

            # Save submission
            if save_path is not None:
                with open(os.path.join(save_path, "submission.json"), "w") as f:
                    json.dump(submission, f)

            # Final result
            all_results = {f"ARC/pass@{k}": correct[i] / len(self.test_puzzles) for i, k in enumerate(self.pass_Ks)}

            print(f"\n[ARC DIAGNOSTICS]")
            print(f"  Total test examples: {total_test_examples}")
            print(f"  Examples with no predictions: {examples_with_no_predictions}")
            print(f"  Examples with top-1 hash match: {examples_with_hash_match} ({100*examples_with_hash_match/max(1,total_test_examples):.1f}%)")
            print(f"  Examples with duplicate attempts: {examples_with_duplicate_attempts} ({100*examples_with_duplicate_attempts/max(1,total_test_examples):.1f}%)")

            return all_results
