apiVersion: batch/v1
kind: Job
metadata:
  name: trm-train-arc2-8gpu
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: trainer
          image: nvidia/cuda:12.1.0-devel-ubuntu22.04
          imagePullPolicy: IfNotPresent
          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-api-key
                  key: token
            - name: WANDB_MODE
              value: online
            - name: WANDB_PROJECT
              value: trm-arc2
            - name: CUDA_HOME
              value: /usr/local/cuda
            - name: HYDRA_FULL_ERROR
              value: "1"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: PYTHONPATH
              value: /usr/local/lib/python3.10/dist-packages:/workspace/TinyRecursiveModels:/workspace
            - name: PYTHONFAULTHANDLER
              value: "1"
            - name: TORCH_NCCL_ASYNC_ERROR_HANDLING
              value: "1"
            - name: NCCL_DEBUG
              value: INFO
            - name: TORCH_NCCL_BLOCKING_WAIT
              value: "1"
          command: ["bash", "-lc"]
          args:
            - |
              set -euo pipefail
              source /script/common.sh
              cd /workspace/TinyRecursiveModels
              [ -d data/arc2concept-aug-1000 ] || { echo 'dataset missing at /workspace/TinyRecursiveModels/data/arc2concept-aug-1000' >&2; ls -la data || true; exit 2; }
              export PATH="/root/.local/bin:${PATH}"
              run_name="trm_arc2_8gpu"
              python3 -m torch.distributed.run --nproc_per_node 8 --rdzv_backend=c10d --rdzv_endpoint=localhost:0 --nnodes=1 pretrain.py \
                arch=trm \
                data_paths="[data/arc2concept-aug-1000]" \
                arch.L_layers=2 \
                arch.H_cycles=3 arch.L_cycles=4 \
                +run_name="${run_name}" ema=True \
                checkpoint_every_eval=True \
                epochs=24000 eval_interval=100 \
                global_batch_size=768
          volumeMounts:
            - name: trm-workspace
              mountPath: /workspace
            - name: script
              mountPath: /script/common.sh
              subPath: common.sh
            - name: trm-eval-overlay
              mountPath: /workspace/TinyRecursiveModels/evaluators/arc.py
              subPath: arc.py
            - name: trm-sitecustomize
              mountPath: /usr/local/lib/python3.10/dist-packages/sitecustomize.py
              subPath: sitecustomize.py
            - name: dshm
              mountPath: /dev/shm
          resources:
            limits:
              nvidia.com/gpu: 8
              cpu: "16"
              memory: 96Gi
            requests:
              nvidia.com/gpu: 8
              cpu: "8"
              memory: 48Gi
      volumes:
        - name: trm-workspace
          persistentVolumeClaim:
            claimName: trm-workspace-rwx
        - name: script
          configMap:
            name: trm-common-script
        - name: trm-eval-overlay
          configMap:
            name: trm-eval-overlay
        - name: trm-sitecustomize
          configMap:
            name: trm-sitecustomize
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 16Gi
