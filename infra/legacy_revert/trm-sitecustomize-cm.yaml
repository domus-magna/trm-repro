apiVersion: v1
kind: ConfigMap
metadata:
  name: trm-sitecustomize
data:
  sitecustomize.py: |
    # Only patch inference_mode if the module exists (skip during bootstrap)
    import importlib
    import importlib.util
    import sys

    def _site_log(message: str) -> None:
      print(message, file=sys.stderr, flush=True)

    if importlib.util.find_spec("torch") is not None:
      import torch
      if hasattr(torch, "inference_mode"):
        _site_log("[SITE] torch.inference_mode present; leaving as-is")
      elif hasattr(torch, "no_grad"):
        torch.inference_mode = torch.no_grad
        _site_log("[SITE] torch.inference_mode patched to no_grad")
      else:
        _site_log("[SITE] torch missing inference_mode/no_grad")
    else:
      _site_log("[SITE] torch not installed yet; skipping inference patch")
